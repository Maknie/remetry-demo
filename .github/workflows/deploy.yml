# CI + деплой demo-витрины на GitHub Pages.
# PR: только build+typecheck. Push в main: build → Pages.
#
# Перед первым запуском: Settings → Pages → Source = "GitHub Actions".
# Опциональные repo variables (Settings → Variables → Actions), чтобы витрина
# била в живой Remetry на Oracle VM, а не в localhost-дефолты:
#   VITE_REMETRY_ENDPOINT  напр. https://remetry-ingest.duckdns.org/ingest/events
#   VITE_REMETRY_DSN       public DSN проекта из dashboard
#   VITE_DASHBOARD_URL     напр. https://remetry-app.duckdns.org
# Мок-API (/__mock) живёт только в vite dev — на Pages страница API-демо будет
# получать сетевые ошибки; для витрины это ок (они сами же летят в Remetry).
name: deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: build (base = /<repo>/ для project pages)
        env:
          VITE_REMETRY_ENDPOINT: ${{ vars.VITE_REMETRY_ENDPOINT || 'http://localhost:8080/ingest/events' }}
          VITE_REMETRY_DSN: ${{ vars.VITE_REMETRY_DSN || 'demo-public-dsn' }}
          VITE_DASHBOARD_URL: ${{ vars.VITE_DASHBOARD_URL || 'http://localhost:5173' }}
        run: npx vite build --base "/${{ github.event.repository.name }}/"
      - name: SPA fallback (BrowserRouter → 404.html)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
